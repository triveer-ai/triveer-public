        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; line-height: 1.65; text-align: center; }

            background: linear-gradient(135deg, var(--brand), var(--brand-light), var(--accent-teal));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 12px;
        }
        h1 { font-weight: 800; font-size: 1.6rem; margin-bottom: 12px; }
        p { color: var(--muted); margin-bottom: 28px; font-size: 1rem; }
        .btn {
            display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px;
            border-radius: 12px; background: linear-gradient(135deg, var(--brand), var(--brand-light));
            color: #fff; text-decoration: none; font-weight: 600; font-size: 0.95rem;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.4); transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .links { margin-top: 24px; font-size: 0.88rem; color: var(--dim); }
        .links a { color: var(--brand-light); text-decoration: none; margin: 0 10px; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
